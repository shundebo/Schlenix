<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schlenix - 前端伪操作系统</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/desktop.css">
    <link rel="stylesheet" href="styles/window.css">
    <link rel="stylesheet" href="styles/taskbar.css">
    <link rel="stylesheet" href="styles/apps.css">
</head>
<body>
    <!-- 桌面背景 -->
    <div id="desktop">
        <!-- 桌面图标区域 -->
        <div id="desktop-icons">
            <div class="desktop-icon" data-app="file-manager">
                <div class="icon-image">📁</div>
                <div class="icon-label">文件管理器</div>
            </div>
            <div class="desktop-icon" data-app="terminal">
                <div class="icon-image">💻</div>
                <div class="icon-label">终端</div>
            </div>
            <div class="desktop-icon" data-app="browser">
                <div class="icon-image">🌐</div>
                <div class="icon-label">浏览器</div>
            </div>
            <div class="desktop-icon" data-app="settings">
                <div class="icon-image">⚙️</div>
                <div class="icon-label">系统设置</div>
            </div>
            <div class="desktop-icon" data-app="about">
                <div class="icon-image">ℹ️</div>
                <div class="icon-label">关于 Schlenix</div>
            </div>
        </div>

        <!-- 窗口容器 -->
        <div id="windows-container"></div>
    </div>

    <!-- 任务栏 -->
    <div id="taskbar">
        <!-- 应用菜单 -->
        <div id="app-menu">
            <button id="menu-button">
                <span class="menu-icon">🐧</span>
                <span class="menu-text">应用</span>
            </button>
            <div id="menu-panel" class="hidden">
                <div class="menu-section">
                    <div class="menu-section-title">系统</div>
                    <div class="menu-item" data-app="file-manager">
                        <span class="menu-item-icon">📁</span>
                        <span class="menu-item-text">文件管理器</span>
                    </div>
                    <div class="menu-item" data-app="terminal">
                        <span class="menu-item-icon">💻</span>
                        <span class="menu-item-text">终端</span>
                    </div>
                    <div class="menu-item" data-app="settings">
                        <span class="menu-item-icon">⚙️</span>
                        <span class="menu-item-text">系统设置</span>
                    </div>
                </div>
                <div class="menu-section">
                    <div class="menu-section-title">应用程序</div>
                    <div class="menu-item" data-app="browser">
                        <span class="menu-item-icon">🌐</span>
                        <span class="menu-item-text">浏览器</span>
                    </div>
                    <div class="menu-item" data-app="text-editor">
                        <span class="menu-item-icon">📝</span>
                        <span class="menu-item-text">文本编辑器</span>
                    </div>
                    <div class="menu-item" data-app="calculator">
                        <span class="menu-item-icon">🔢</span>
                        <span class="menu-item-text">计算器</span>
                    </div>
                </div>
                <div class="menu-section">
                    <div class="menu-section-title">关于</div>
                    <div class="menu-item" data-app="about">
                        <span class="menu-item-icon">ℹ️</span>
                        <span class="menu-item-text">关于 Schlenix</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 任务栏窗口列表 -->
        <div id="taskbar-windows"></div>

        <!-- 系统托盘 -->
        <div id="system-tray">
            <div class="tray-item" id="clock">00:00</div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/notification.js"></script>
    <script src="js/context-menu.js"></script>
    <script src="js/window-manager.js"></script>
    <script src="js/desktop.js"></script>
    <script src="js/taskbar.js"></script>
    <script src="js/apps/file-manager.js"></script>
    <script src="js/apps/terminal.js"></script>
    <script src="js/apps/browser.js"></script>
    <script src="js/apps/settings.js"></script>
    <script src="js/apps/text-editor.js"></script>
    <script src="js/apps/calculator.js"></script>
    <script src="js/apps/about.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
